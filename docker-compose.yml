services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
    env_file:
      - ./apps/backend/.env
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      - redis

  worker:
    build:
      context: ./apps/backend
    command: ["node", "src/worker.js"]
    env_file:
      - ./apps/backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

